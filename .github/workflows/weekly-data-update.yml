name: Weekly Data Update

on:
  workflow_dispatch:
  schedule:
    # Saturday 13:30 UTC — ~8:30 AM CDT / ~7:30 AM CST (after CDC Friday publish)
    - cron: "30 13 * * 6"

concurrency:
  group: weekly-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CDC_WASTEWATER_CSV_URL: ${{ secrets.CDC_WASTEWATER_CSV_URL }}
      INGESTION_TRIGGER_TYPE: schedule
      GIT_COMMIT: ${{ github.sha }}
      VERCEL_REVALIDATE_URL: ${{ secrets.VERCEL_REVALIDATE_URL }}
      VERCEL_REVALIDATE_SECRET: ${{ secrets.VERCEL_REVALIDATE_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run weekly pipeline
        run: python scripts/run_weekly_pipeline.py
